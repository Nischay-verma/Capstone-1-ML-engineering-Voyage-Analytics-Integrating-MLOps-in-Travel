apiVersion: apps/v1
kind: Deployment
metadata:
  name: flight-price-predictor-deployment
  labels:
    app: flight-price-predictor
spec:
  replicas: 2 # You can adjust the number of replicas for scalability
  selector:
    matchLabels:
      app: flight-price-predictor
  template:
    metadata:
      labels:
        app: flight-price-predictor
    spec:
      containers:
      - name: flight-price-predictor
        image: your-docker-registry/flight-price-predictor:latest # Replace with your Docker image path
        ports:
        - containerPort: 5000
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: flight-price-predictor-service
spec:
  selector:
    app: flight-price-predictor
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: LoadBalancer # Use NodePort for local clusters or LoadBalancer/ClusterIP depending on your needs
